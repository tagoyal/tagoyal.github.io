resume_header_intro: "<p></p>
<br><br><br>
<p><b>I will start as a Assistant Professor at Cornell CS in Fall 2024. I am looking to admit 1-2 PhD students in this admission cycle.</b> See Cornell CS's <a href=\"https://www.cs.cornell.edu/phd/admissions\">PhD admission page</a> for details of the admission process. </p>

<p></p>

<p>
I am a postdoc at the Center for Language and Intelligence at Princeton. I obtained my PhD in June 2023 from the Computer Science department at UT Austin. My advisor was <a href=\"https://www.cs.utexas.edu/~gdurrett/\" >Greg Durrett</a>, am I was part of the <a href=\"http://taur.cs.utexas.edu/\" >TAUR lab</a> and the wider <a href=\"https://www.nlp.utexas.edu/\">UT NLP group</a>. My PhD research focused on building evaluation tools for text generation models, focusing on aspects like factuality and coherence. Before grad school, I worked at the Adobe Research Lab in Bangalore, India. Even before that, I learnt how to Math at the Indian Institute of Technology, Guwahati (Maths and Computing, B.Tech 2011-2015). </p>

<p> </p>
<a href=\"TanyaGoyal_CV.pdf\"> CV </a> | <a href=\"TanyaGoyal_Research.pdf\"> Research Statement </a>
"


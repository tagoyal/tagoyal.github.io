resume_header_intro: "<p>
Hi! I am a second year CS Ph.D. student at the University of Texas at Austin. 
I am advised by <a href=\"https://www.cs.utexas.edu/~gdurrett/\" >Greg Durrett</a>, and part of the <a href=\"http://taur.cs.utexas.edu/\" >TAUR lab</a> at UT. My research is primarily focused on deep models for text generation. 
I think about controllability and faithfulness of generation models. </p>
<p>Before grad school, I worked at the Adobe Research Lab in Bangalore, India. Even before that, I learnt how to Math at the Indian Institute of Technology, Guwahati (Maths and Computing, B.Tech 2011-2015).
"

